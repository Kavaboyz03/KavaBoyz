<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="description" content="KavaBoyz — Ingredients, website, and payment info."/>
<title>KavaBoyz — Product Info</title>

<style>
:root{
--bg:#0b0b0c;
--card:#141416;
--text:#f2f2f3;
--muted:#b6b6bc;
--border:rgba(255,255,255,.12);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(180deg,#0b0b0c 0%,#0f1012 100%);
color:var(--text);
}

.wrap{
max-width:860px;
margin:0 auto;
padding:28px 18px 54px;
}

header{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
padding:10px 0 24px;
}

header img{
width:min(520px,92vw);
height:auto;
display:block;
border-radius:18px;
background:#ffffff;
padding:10px;
}

.brand{
font-size:22px;
font-weight:600;
letter-spacing:.3px;
}

.tagline{
text-align:center;
color:var(--muted);
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

@media (min-width:720px){
.grid{grid-template-columns:1fr 1fr;}
}

.card{
background:rgba(20,20,22,.78);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
}

h2{
margin:0 0 10px;
font-size:16px;
}

p,li{
margin:0;
color:var(--muted);
font-size:14px;
line-height:1.55;
}

.pill{
display:inline-flex;
align-items:center;
padding:10px 14px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.06);
text-decoration:none;
font-size:13px;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
}

.mono{
font-family:ui-monospace,Menlo,Monaco,monospace;
color:var(--text);
}

.footer{
margin-top:20px;
text-align:center;
color:rgba(255,255,255,.55);
font-size:12px;
}
</style>
</head>

<body>

<div class="wrap">

<header>

<img src="logo.png" alt="KavaBoyz logo"/>

<div class="brand">
KavaBoyz<sup>™</sup>
</div>

<p class="tagline">
Scan-ready product page for ingredients, website, and payment.
</p>

</header>

<div class="grid">

<section class="card">
<h2>Ingredients</h2>
<p><strong>Pure Powdered Kava (Piper methysticum) *Hand Cleaned*</strong></p>
</section>

<section class="card">
<h2>Website</h2>
<p>Visit our official website:</p>

<div class="actions">
<a class="pill" href="https://www.kavaboyz.us" target="_blank">
www.kavaboyz.us
</a>
</div>
</section>

<section class="card" style="grid-column:1/-1;">

<h2>Payment</h2>

<p>Zelle only to:</p>

<p class="mono" style="margin-top:8px;font-size:16px;">
kavaboyz03@gmail.com
</p>

<div class="actions">

<a class="pill" href="mailto:kavaboyz03@gmail.com?subject=KavaBoyz%20Order%20Inquiry">
Email KavaBoyz
</a>

<a class="pill" href="#copy"
onclick="navigator.clipboard.writeText('kavaboyz03@gmail.com');return false;">
Copy Zelle Email
</a>

</div>

</section>

</div>

<div class="footer">
© 2026 KavaBoyz LLC
</div>

</div>

</body>
</html>
